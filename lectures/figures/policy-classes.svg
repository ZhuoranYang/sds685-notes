<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family="'Palatino Linotype', 'Book Antiqua', Palatino, 'Times New Roman', serif">
  <!-- Background -->
  <rect width="660" height="300" rx="12" fill="#f9f6f0" stroke="#d4c9b8" stroke-width="1.5"/>

  <!-- Title -->
  <text x="330" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#3d3530">Nested Policy Classes in MDPs</text>

  <!-- Outer box: History-dependent stochastic -->
  <rect x="40" y="55" width="580" height="230" rx="16" fill="#7b97ad" fill-opacity="0.12" stroke="#7b97ad" stroke-width="2.5"/>
  <text x="330" y="82" text-anchor="middle" font-size="15" font-weight="bold" fill="#3d3530">History-Dependent Stochastic Policies</text>
  <text x="330" y="100" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Action depends on the full history of states and actions</text>

  <!-- Middle box: Markov stochastic -->
  <rect x="90" y="115" width="480" height="150" rx="14" fill="#b8995e" fill-opacity="0.15" stroke="#b8995e" stroke-width="2.2"/>
  <text x="330" y="140" text-anchor="middle" font-size="15" font-weight="bold" fill="#3d3530">Markov Stochastic Policies</text>
  <text x="330" y="158" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Action depends only on current state (memoryless)</text>

  <!-- Inner box: Deterministic Markov -->
  <rect x="150" y="172" width="360" height="75" rx="12" fill="#7a9a7e" fill-opacity="0.2" stroke="#7a9a7e" stroke-width="2.5"/>
  <text x="330" y="197" text-anchor="middle" font-size="15" font-weight="bold" fill="#3d3530">Deterministic Markov Policies</text>
  <text x="330" y="215" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">One fixed action per state (no randomness)</text>

  <!-- Star and annotation for optimal policy -->
  <text x="316" y="243" text-anchor="middle" font-size="18" fill="#b8995e">&#9733;</text>
  <text x="380" y="243" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d3530">Optimal policy lives here!</text>

  <!-- Subset symbols on the left -->
  <text x="68" y="192" text-anchor="middle" font-size="22" fill="#7b97ad" font-weight="bold">&#8839;</text>
  <text x="128" y="215" text-anchor="middle" font-size="22" fill="#b8995e" font-weight="bold">&#8839;</text>
</svg>
