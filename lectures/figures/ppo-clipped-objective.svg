<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow-ppo" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto">
      <polygon points="0 0, 8 2.5, 0 5" fill="#3d3530"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="380" fill="#f9f6f0" rx="6"/>

  <!-- Title -->
  <text x="340" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#3d3530">PPO Clipped Surrogate Objective</text>

  <!-- ===== Case A > 0 (left plot) ===== -->
  <text x="190" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#7a9a7e">Case: A > 0 (good action)</text>

  <!-- Axes (left) -->
  <line x1="60" y1="200" x2="360" y2="200" stroke="#3d3530" stroke-width="1" marker-end="url(#arrow-ppo)"/>
  <line x1="60" y1="310" x2="60" y2="60" stroke="#3d3530" stroke-width="1" marker-end="url(#arrow-ppo)"/>

  <!-- Axis labels (left) -->
  <text x="210" y="330" text-anchor="middle" font-size="11" fill="#3d3530" font-style="italic">policy ratio</text>
  <text x="30" y="135" text-anchor="middle" font-size="10" fill="#3d3530" font-style="italic" transform="rotate(-90, 30, 135)">L-clip</text>

  <!-- Clip region markers (left) -->
  <!-- 1-e at x=140, 1 at x=200, 1+e at x=260 -->
  <line x1="140" y1="195" x2="140" y2="305" stroke="#3d3530" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="260" y1="195" x2="260" y2="305" stroke="#3d3530" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="200" y1="195" x2="200" y2="305" stroke="#3d3530" stroke-width="0.6" stroke-dasharray="3,3"/>

  <text x="140" y="318" text-anchor="middle" font-size="9" fill="#3d3530">1-eps</text>
  <text x="200" y="318" text-anchor="middle" font-size="9" fill="#3d3530">1</text>
  <text x="260" y="318" text-anchor="middle" font-size="9" fill="#3d3530">1+eps</text>

  <!-- Clip region shading (left) -->
  <rect x="140" y="68" width="120" height="232" fill="#7a9a7e" fill-opacity="0.06"/>

  <!-- Unclipped line (rises linearly): slope A > 0 -->
  <!-- from (60, 240) to (340, 80) -->
  <line x1="60" y1="240" x2="340" y2="80" stroke="#7b97ad" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="315" y="90" font-size="9" fill="#7b97ad">r * A (unclipped)</text>

  <!-- Clipped objective (left): min of unclipped and clip -->
  <!-- Left segment: r < 1-e, unclipped r*A rises -->
  <line x1="60" y1="240" x2="140" y2="190" stroke="#b8995e" stroke-width="2.5"/>
  <!-- Middle segment: 1-e <= r <= 1+e, same as unclipped -->
  <line x1="140" y1="190" x2="260" y2="120" stroke="#b8995e" stroke-width="2.5"/>
  <!-- Right segment: r > 1+e, FLAT at (1+e)*A -->
  <line x1="260" y1="120" x2="340" y2="120" stroke="#b8995e" stroke-width="2.5"/>

  <!-- Flat region label (left) -->
  <text x="308" y="112" text-anchor="middle" font-size="9" fill="#b8995e" font-weight="bold">flat (clipped)</text>
  <text x="308" y="140" text-anchor="middle" font-size="8" fill="#b8995e">gradient = 0</text>

  <!-- ===== Case A < 0 (right plot) ===== -->
  <text x="520" y="50" text-anchor="middle" font-size="12" font-weight="bold" fill="#7b97ad">Case: A &lt; 0 (bad action)</text>

  <!-- Axes (right) -->
  <line x1="390" y1="200" x2="660" y2="200" stroke="#3d3530" stroke-width="1" marker-end="url(#arrow-ppo)"/>
  <line x1="390" y1="310" x2="390" y2="60" stroke="#3d3530" stroke-width="1" marker-end="url(#arrow-ppo)"/>

  <!-- Axis labels (right) -->
  <text x="525" y="330" text-anchor="middle" font-size="11" fill="#3d3530" font-style="italic">policy ratio</text>
  <text x="372" y="135" text-anchor="middle" font-size="10" fill="#3d3530" font-style="italic" transform="rotate(-90, 372, 135)">L-clip</text>

  <!-- Clip region markers (right) -->
  <line x1="468" y1="195" x2="468" y2="305" stroke="#3d3530" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="586" y1="195" x2="586" y2="305" stroke="#3d3530" stroke-width="0.6" stroke-dasharray="3,3"/>
  <line x1="527" y1="195" x2="527" y2="305" stroke="#3d3530" stroke-width="0.6" stroke-dasharray="3,3"/>

  <text x="468" y="318" text-anchor="middle" font-size="9" fill="#3d3530">1-eps</text>
  <text x="527" y="318" text-anchor="middle" font-size="9" fill="#3d3530">1</text>
  <text x="586" y="318" text-anchor="middle" font-size="9" fill="#3d3530">1+eps</text>

  <!-- Clip region shading (right) -->
  <rect x="468" y="68" width="118" height="232" fill="#7b97ad" fill-opacity="0.06"/>

  <!-- Unclipped line (descends linearly): slope A < 0 -->
  <line x1="390" y1="110" x2="650" y2="270" stroke="#7b97ad" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="630" y="263" font-size="9" fill="#7b97ad">r * A</text>

  <!-- Clipped objective (right): min = max of clipped and unclipped (since A<0, min flips) -->
  <!-- Left segment: r < 1-e, FLAT at (1-e)*A -->
  <line x1="390" y1="228" x2="468" y2="228" stroke="#b8995e" stroke-width="2.5"/>
  <!-- Middle segment: same as unclipped -->
  <line x1="468" y1="228" x2="586" y2="300" stroke="#b8995e" stroke-width="2.5"/>
  <!-- Right segment: r > 1+e, continues falling (unclipped dominates) -->
  <line x1="586" y1="300" x2="650" y2="300" stroke="#b8995e" stroke-width="2.5"/>

  <!-- Flat region label (right) -->
  <text x="425" y="220" text-anchor="middle" font-size="9" fill="#b8995e" font-weight="bold">flat (clipped)</text>
  <text x="425" y="244" text-anchor="middle" font-size="8" fill="#b8995e">gradient = 0</text>

  <!-- Zero line reference -->
  <line x1="60" y1="200" x2="340" y2="200" stroke="#3d3530" stroke-width="0.3"/>
  <text x="55" y="204" text-anchor="end" font-size="8" fill="#3d3530">0</text>
  <line x1="390" y1="200" x2="650" y2="200" stroke="#3d3530" stroke-width="0.3"/>
  <text x="385" y="204" text-anchor="end" font-size="8" fill="#3d3530">0</text>

  <!-- Bottom explanation -->
  <rect x="80" y="345" width="520" height="28" rx="5" fill="#ffffff" stroke="#3d3530" stroke-width="0.8"/>
  <text x="340" y="364" text-anchor="middle" font-size="10" fill="#3d3530">Clipping prevents large policy updates: gradient is zero when r(theta) exits [1-eps, 1+eps]</text>
</svg>