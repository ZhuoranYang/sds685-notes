<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3d3530"/>
    </marker>
  </defs>

  <rect width="600" height="380" rx="12" fill="#f9f6f0" stroke="#d4c9b8" stroke-width="1.5"/>

  <!-- SDP (top) -->
  <rect x="150" y="25" width="300" height="55" rx="10" fill="#7b97ad" fill-opacity="0.18" stroke="#7b97ad" stroke-width="2.5"/>
  <text x="300" y="48" text-anchor="middle" font-size="17" font-weight="bold" fill="#3d3530">Stochastic Decision Process</text>
  <text x="300" y="68" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Most general framework</text>

  <!-- Arrows from SDP -->
  <path d="M 220,80 L 120,120" stroke="#3d3530" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 300,80 L 300,120" stroke="#3d3530" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 380,80 L 480,120" stroke="#3d3530" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Arrow labels -->
  <text x="155" y="97" text-anchor="middle" font-size="11" fill="#8a7a5e" font-style="italic">single step</text>
  <text x="320" y="107" text-anchor="start" font-size="11" fill="#8a7a5e" font-style="italic">+ context</text>
  <text x="435" y="97" text-anchor="middle" font-size="11" fill="#8a7a5e" font-style="italic">+ Markov property</text>

  <!-- Bandit -->
  <rect x="35" y="120" width="170" height="55" rx="10" fill="#b8995e" fill-opacity="0.18" stroke="#b8995e" stroke-width="2.5"/>
  <text x="120" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#3d3530">Bandit</text>
  <text x="120" y="163" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Single step, no state</text>

  <!-- Contextual Bandit -->
  <rect x="215" y="120" width="170" height="55" rx="10" fill="#b8995e" fill-opacity="0.18" stroke="#b8995e" stroke-width="2.5"/>
  <text x="300" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#3d3530">Contextual Bandit</text>
  <text x="300" y="163" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Single step + context</text>

  <!-- MDP -->
  <rect x="395" y="120" width="170" height="55" rx="10" fill="#7a9a7e" fill-opacity="0.18" stroke="#7a9a7e" stroke-width="2.5"/>
  <text x="480" y="143" text-anchor="middle" font-size="16" font-weight="bold" fill="#3d3530">MDP</text>
  <text x="480" y="163" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Sequential + Markov</text>

  <!-- Arrows from MDP -->
  <path d="M 440,175 L 330,220" stroke="#3d3530" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <path d="M 520,175 L 520,220" stroke="#3d3530" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Arrow labels -->
  <text x="370" y="197" text-anchor="middle" font-size="11" fill="#8a7a5e" font-style="italic">finite horizon</text>
  <text x="540" y="202" text-anchor="start" font-size="11" fill="#8a7a5e" font-style="italic">discounted</text>

  <!-- Episodic MDP -->
  <rect x="210" y="220" width="200" height="55" rx="10" fill="#a58b6d" fill-opacity="0.18" stroke="#a58b6d" stroke-width="2.5"/>
  <text x="310" y="243" text-anchor="middle" font-size="16" font-weight="bold" fill="#3d3530">Episodic MDP</text>
  <text x="310" y="263" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Finite horizon H</text>

  <!-- Discounted MDP -->
  <rect x="425" y="220" width="150" height="55" rx="10" fill="#a58b6d" fill-opacity="0.18" stroke="#a58b6d" stroke-width="2.5"/>
  <text x="500" y="243" text-anchor="middle" font-size="16" font-weight="bold" fill="#3d3530">Discounted MDP</text>
  <text x="500" y="263" text-anchor="middle" font-size="12" fill="#5a524c" font-style="italic">Infinite horizon</text>

  <!-- Focus box -->
  <rect x="190" y="300" width="320" height="40" rx="8" fill="#7a9a7e" fill-opacity="0.12" stroke="#7a9a7e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="350" y="325" text-anchor="middle" font-size="13" fill="#3d3530" font-style="italic">This course focuses on MDPs (episodic and discounted)</text>

  <!-- Dashed lines to focus box -->
  <path d="M 310,275 L 320,300" stroke="#7a9a7e" stroke-width="1.2" stroke-dasharray="4,3" fill="none"/>
  <path d="M 500,275 L 400,300" stroke="#7a9a7e" stroke-width="1.2" stroke-dasharray="4,3" fill="none"/>
</svg>
