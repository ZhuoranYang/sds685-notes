<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 130" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3d3530"/>
    </marker>
  </defs>

  <rect width="420" height="130" rx="12" fill="#f9f6f0" stroke="#d4c9b8" stroke-width="1.5"/>

  <!-- Agent box -->
  <rect x="40" y="30" width="120" height="70" rx="10" fill="#7b97ad" fill-opacity="0.18" stroke="#7b97ad" stroke-width="2.5"/>
  <text x="100" y="70" text-anchor="middle" font-size="20" font-weight="bold" fill="#3d3530">Agent</text>

  <!-- Arrow: choose a -->
  <path d="M 160,65 L 250,65" stroke="#3d3530" stroke-width="2.2" fill="none" marker-end="url(#arr)"/>
  <text x="205" y="55" text-anchor="middle" font-size="14" fill="#5a524c" font-style="italic">choose action</text>

  <!-- Reward circle -->
  <circle cx="315" cy="65" r="42" fill="#b8995e" fill-opacity="0.18" stroke="#b8995e" stroke-width="2.5"/>
  <text x="315" y="62" text-anchor="middle" font-size="16" font-weight="bold" fill="#3d3530">reward</text>
  <text x="315" y="80" text-anchor="middle" font-size="15" fill="#3d3530" font-style="italic">r</text>

  <!-- Bottom annotation -->
  <text x="210" y="118" text-anchor="middle" font-size="12" fill="#7b7067" font-style="italic">Single step: no state, no transition</text>
</svg>
